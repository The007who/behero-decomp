<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="behero, be hero, combatti, giochipreziosi, gioco, giochi, digitalpreziosi">

    <title>{{ page.title }} - BeHero Wiki</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="resources/layout/icon.ico">
    <script src="js/script.js"></script>
    {% seo %}
</head>
<body onload="startUp();">

    <img src="resources/layout/header.jpg" alt="header" draggable="false" style="margin-bottom: 3px;">

    <iframe class="ghbutton" src="https://ghbtns.com/github-btn.html?user=The007who&repo=behero-decomp&type=star&count=true&size=large" 
    frameborder="0" scrolling="0" width="170" height="30" title="GitHub">
    </iframe>

    <nav>

        <div><a href="index"><img src="resources/layout/home.png" alt="homebtn"></a></div>
        <div><a href="game">GAME</a></div>
        <div><a href="world">WORLD</a></div>
        <div><a href="cards"><img src="resources/layout/cards.png" alt="cardsbtn"></a></div>
        <div><a href="media">MEDIA</a></div>
        <div><a href="hardware"><img src="resources/layout/hardware.png" alt="hardwarebtn"></a></div>

    </nav>

    <div class="content">
        {{ content }}
    </div>

    <footer>
        <section>
            <img src="resources/layout/box_news.jpg" alt="news_box" draggable="false">
            <div id="commit-history"></div>
        </section>

        <section>
            <a href="hardware">
                <img src="resources/layout/box_console.jpg" alt="box_console" draggable="false">
            </a>
        </section>
    </footer>


</body>
</html>
